<!DOCTYPE html>
<html>
<head><title>Login</title><meta charset='UTF-8'>
<style>
body{font-family:Arial,sans-serif;margin:0;padding:0;background:#667eea;min-height:100vh;display:flex;align-items:center;justify-content:center}
.box{background:#fff;padding:40px;border-radius:10px;box-shadow:0 4px 20px rgba(0,0,0,0.3);text-align:center;width:300px}
h1{margin:0 0 20px 0;color:#667eea}
input{width:100%;padding:12px;margin-bottom:15px;border:1px solid #ddd;border-radius:5px;box-sizing:border-box}
button{width:100%;padding:12px;background:#667eea;color:#fff;border:none;border-radius:5px;cursor:pointer;font-size:16px}
button:hover{background:#5a6fd6}
.err{color:#e74c3c;margin-top:10px}
</style></head>
<body>
<div class='box'>
<h1>Clinic Dashboard</h1>
<form onsubmit='return login()'>
<input type='text' id='u' placeholder='Username' required>
<input type='password' id='p' placeholder='Password' required>
<button type='submit'>Sign In</button>
</form>
<div id='e' class='err'></div>
</div>
<script>
function login(){var u=document.getElementById('u').value;var p=document.getElementById('p').value;var e=document.getElementById('e');if(u=='admin'&&p=='clinic123'){window.location.href='index.html';return false;}e.innerHTML='Invalid credentials';return false;}
</script>
</body></html>
